name: Market Intelligence Update

on:
  schedule:
    # Cada 2 horas en horario de mercado (~6am-10pm Chile = 9-1am UTC)
    # Lunes-Viernes
    - cron: '0 9,11,13,15,17,19,21,23,1 * * 1-5'
    # Sábado/Domingo: cada 4h por si hay news macro
    - cron: '0 12,16,20 * * 6,0'
  workflow_dispatch:

jobs:
  intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env

      # 1. Recolectar noticias de RSS (gratis, sin API)
      - name: Fetch news
        run: python -m intelligence.news_fetcher --hours 6
        continue-on-error: true

      # 2. Health check de cartera (independiente de noticias)
      - name: Portfolio health monitor
        run: python -m intelligence.portfolio_health
        continue-on-error: true

      # ⚠️ NOTA (2026-07-05): ai_analyst y daily_brief ELIMINADOS de aquí.
      # Corrían cada 2 horas × 30 noticias = ~$2/día en API Anthropic.
      # El análisis ahora es 100% sin API: reglas z-score + RSI(2) + EDGAR
      # (insiders/13F) + newsletters de GBrain. NO volver a agregar llamadas
      # AI a workflows con cron sin consultar el costo diario primero.

      - name: Summary
        if: always()
        run: echo "✅ Intelligence update terminado a $(date)"
