name: Weekly Discovery Scan

# Visibilidad de jugadores nuevos FUERA del universo conocido (cartera +
# watchlist + verticales de investor_profile.yaml). Cadencia SEMANAL a
# pedido explícito de Matías — son eventos de baja frecuencia, no señales
# de compra ("esto existe, evalúalo", no "compra esto").
#
# 3 fuentes cloud-compatible (la 4ta, newsletters de GBrain, corre
# localmente vía run_weekly_update.sh porque el brain vive en el Mac):
#   1. 13F de smart money — emisores no reconocidos
#   2. Escáner de IPOs (SEC EDGAR full-text-search sobre S-1 nuevos)
#   3. Menciones nuevas en noticias ya recolectadas (market_news)
#
# CERO llamadas a la API de Anthropic — solo SEC EDGAR + yfinance + Supabase.

on:
  schedule:
    - cron: '0 12 * * 1'   # 12:00 UTC lunes = 9:00 Chile (offset del daily 8am)
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}" >> .env

      - name: Scan for new players (13F + IPOs + news mentions)
        run: python -m intelligence.pipeline_stats --script discovery --table portfolio_alerts -- python -m intelligence.discovery --days 8
        continue-on-error: true

      - name: Send weekly discovery digest
        run: python -m intelligence.pipeline_stats --script discovery_report -- python -m intelligence.discovery_report --days 8
        continue-on-error: true
