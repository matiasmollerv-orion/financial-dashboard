name: Daily Financial Update

on:
  schedule:
    # 11:00 UTC = 08:00 Chile. Si GitHub se atrasa, igual corre cuando pueda.
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "SANTANDER_PDF_PASSWORD=${{ secrets.SANTANDER_PDF_PASSWORD }}" >> .env
          echo "GMAIL_USER=${{ secrets.GMAIL_USER }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}" >> .env

      # Trackeamos qué pasos fallaron en un archivo, y al final decidimos el exit code
      - name: Init failure tracker
        run: echo "" > /tmp/failures.txt

      - name: Run Santander update (gastos + cuenta corriente)
        id: santander
        run: python load_santander.py --days 14 || echo "santander" >> /tmp/failures.txt

      - name: Run Racional ventas update
        id: ventas
        run: python load_racional_ventas.py --days 14 || echo "racional_ventas" >> /tmp/failures.txt

      - name: Run Racional compras update
        id: compras
        run: |
          if [ -f load_racional.py ]; then
            python load_racional.py --days 14 || echo "racional_compras" >> /tmp/failures.txt
          fi

      - name: Run Racional PDF transactions update
        id: racional_pdf
        run: |
          if [ -f load_racional_pdf.py ]; then
            python load_racional_pdf.py --days 14 || echo "racional_pdf" >> /tmp/failures.txt
          fi

      - name: Run Buda crypto update
        id: buda
        run: |
          if [ -f load_buda.py ]; then
            python load_buda.py --days 14 || echo "buda" >> /tmp/failures.txt
          fi

      - name: Reconcile iPhone notifications with PDF
        run: |
          if [ -f intelligence/reconcile_notifications.py ]; then
            python -m intelligence.reconcile_notifications || true
          fi

      - name: Update cartera_actual (CRÍTICO)
        id: cartera
        run: |
          if [ -f update_cartera.py ]; then
            python update_cartera.py || echo "cartera" >> /tmp/failures.txt
          fi

      # ── Intelligence Pipeline (después de cartera actualizada) ──
      # Solo opportunity_detector (reglas Connors + entry targets, sin API)
      # ai_analyst y daily_brief desactivados para no gastar créditos Anthropic (~$1.80/día)
      - name: Fetch market news (RSS)
        run: python -m intelligence.news_fetcher --hours 26 || echo "news_fetcher" >> /tmp/failures.txt

      - name: Detect opportunities (Connors + entry targets)
        run: python -m intelligence.opportunity_detector || echo "opportunity_detector" >> /tmp/failures.txt

      - name: Sell signals (concentración, trailing, eventos, liquidez)
        run: python -m intelligence.sell_engine || echo "sell_engine" >> /tmp/failures.txt

      - name: EDGAR monitor (insiders + 8-K + smart money 13F)
        run: python -m intelligence.edgar_monitor || echo "edgar_monitor" >> /tmp/failures.txt

      - name: Earnings radar (aviso previo de resultados)
        run: python -m intelligence.earnings_radar || echo "earnings_radar" >> /tmp/failures.txt

      - name: Alert outcomes (feedback loop)
        run: python -m intelligence.alert_outcomes || echo "alert_outcomes" >> /tmp/failures.txt

      # El email lo envía daily-email.yml a las 8:30 (30 min después de este
      # pipeline) — no duplicar el envío aquí.

      - name: Summary + Health flag
        if: always()
        run: |
          echo "===== RESUMEN DE EJECUCIÓN ====="
          echo "Fecha: $(date)"
          if [ -s /tmp/failures.txt ]; then
            echo "❌ PASOS QUE FALLARON:"
            cat /tmp/failures.txt
            echo ""
            echo "Si hay 'santander' o 'racional_*' en la lista, probablemente expiró el token Gmail."
            echo "Si hay 'cartera', falló update_cartera.py (revisar logs)."
          else
            echo "✅ Todos los loaders corrieron sin errores"
          fi
          echo "================================="

      # ⚠️ ESTE STEP HACE QUE EL WORKFLOW FALLE si Gmail expiró o cartera no se actualizó.
      # Esto fuerza que GitHub muestre el run en rojo y se vea claramente que algo está mal.
      - name: Fail loudly if critical steps broke
        if: always()
        run: |
          if [ -s /tmp/failures.txt ]; then
            CRITICAL_FAILED=$(grep -E "santander|racional_compras|cartera" /tmp/failures.txt || true)
            if [ -n "$CRITICAL_FAILED" ]; then
              echo "::error::Pasos críticos fallaron: $CRITICAL_FAILED"
              echo "::error::Revisar token Gmail y regenerar si es necesario."
              exit 1
            fi
          fi
