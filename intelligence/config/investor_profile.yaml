# =============================================================================
# CRITERIOS DE VENTA — política formal, ORDENADA, para evitar recomendaciones
# inconsistentes. Construida el 15 jul 2026 después de un error real: se
# recomendó vender PANW (fundamentalmente MEJOR que CRWD: P/E 45x vs 91x,
# margen FCF 37,6% vs 25,7%) y quedarse con CRWD, usando el momentum técnico
# de PANW como argumento — una contradicción lógica, no una decisión de
# inversión. Basado en investigación real (no inventado):
#   - Peter Lynch: "rotación" — vender por una historia similar pero PEOR,
#     nunca la mejor. Señales objetivas de sobrevaloración: PEG >> 1,
#     crecimiento desacelerando, TAM encogiéndose, márgenes comprimiéndose.
#   - William O'Neil: vender por razones OBJETIVAS, nunca por nervios u
#     opinión. Corte defensivo de pérdidas ~7-8% bajo costo si la tesis
#     falla. Toma de ganancias parcial (25-30%) solo si el momentum se
#     está frenando DESPUÉS de una extensión fuerte — nunca solo "subió".
#   - Práctica institucional (comités de inversión): criterios escritos,
#     explícitos, aplicados en el mismo orden siempre — no ad-hoc.
# =============================================================================
criterios_venta:
  regla_explicita_matias: >
    "No vendo solo por rentabilidad, a no ser que la industria o mi tesis ya
    no tenga sentido en esa posición, o que sea clarísimo que hay que vender
    para tomar ganancias." (confirmado 15 jul 2026)

  orden_de_evaluacion:
    1_tesis_rota:
      pregunta: "¿La industria o la razón original por la que compré esta posición sigue siendo válida?"
      accion_si_no: "VENDER, sin importar el timing técnico. Esto pesa más que cualquier otro criterio."

    2_toma_de_ganancias_objetiva:
      pregunta: >
        ¿Hay una señal OBJETIVA de que es momento de tomar ganancias?
        NO cuenta: "subió mucho", "está cerca de su máximo", "tiene RSI alto"
        POR SÍ SOLOS — eso es fortaleza, no una señal de venta (O'Neil: "si
        se comporta bien, deja correr el resto"). SÍ cuenta: valoración
        desconectada de fundamentales (PEG >> 1 con crecimiento
        desacelerando), o la posición extendida Y mostrando signos reales
        de agotamiento (no solo "está arriba").
      accion_si_si: "Considerar toma de ganancias parcial (25-30%), no venta total automática."

    3_solapamiento_con_mayor_conviccion:
      pregunta: >
        ¿Esta posición cumple el MISMO rol/tesis que otra posición de mayor
        convicción declarada? Si sí: comparar AMBAS en LOS MISMOS criterios
        (P/E, margen, crecimiento, ROE — no solo una narrativa) y quedarse
        con la que gane la comparación real. NUNCA vender la que gana la
        comparación solo porque tiene mejor momentum técnico — el timing
        técnico no pesa más que los fundamentales en esta decisión.
      accion_si_si: "Vender la posición que pierde la comparación directa, no la que gana."

    4_calidad_y_potencial_independiente:
      # Corrección 15 jul 2026: "no es una convicción declarada" es condición
      # NECESARIA pero NO SUFICIENTE para vender. Faltaba evaluar si el activo
      # es bueno por MÉRITO PROPIO, no solo por relación con otras posiciones.
      pregunta: >
        Si NO es parte de una vertical declarada (no pasa por 1-3): ¿tiene
        fundamentales/potencial de rentabilidad atractivos hacia adelante
        por SÍ SOLO? Evaluar con datos reales: crecimiento proyectado,
        valoración vs historia/peers (value analysis), calidad del negocio
        o del factor/sector que representa, catalizadores u outlook de
        industria, o si pasó algo puntual que cambió la historia (mal
        resultado, cambio regulatorio, pérdida de tesis del sector).
      accion_si_fundamentales_debiles_o_evento_puntual: "Vender — no es convicción Y no compensa con calidad propia."
      accion_si_fundamentales_atractivos: "Mantener, aunque no sea convicción formalmente declarada. Documentar por qué (para no repetir este análisis cada vez)."
      nota: "Esto NO es binario. 'No declarada' + 'fundamentales mediocres' = vender. 'No declarada' + 'fundamentales genuinamente buenos' = mantener con criterio, no por default."

      # Análisis aplicado 15 jul 2026 a las posiciones sin vertical declarada.
      # No repetir desde cero — solo revisar si cambia algo material.
      posiciones_evaluadas:
        FTEC: { veredicto: mantener, motivo: "27% YTD, 27% prom 3y — mejor del grupo, exposición directa a tesis IA (incl. AAPL, único lugar donde la tienes)" }
        IJR:  { veredicto: mantener, motivo: "small caps con 40% descuento vs growth (17x vs 29x P/E), crecimiento utilidades proyectado 17-18% 2026-2027 — catalizador recién empezando, no solo track record" }
        VBR:  { veredicto: mantener, motivo: "mismo catalizador small-cap value + mejor consistencia del grupo (15.3% 3y, 10.3% 5y)" }
        SCHH: { veredicto: mantener, motivo: "REITs girando con baja de tasas, sector superando al mercado en 2026; REITs de datacenter ligados al mismo driver de demanda IA que la tesis central" }
        IGF:  { veredicto: mantener, motivo: "mejor promedio 3y del grupo (16.1%), ligado a electrificación" }
        QUAL: { veredicto: mantener, motivo: "retornos sólidos consistentes (17.7% 3y), sin señales de alerta — caso limpio aunque sin catalizador narrativo fuerte" }
        RSP:  { veredicto: vender, motivo: "por diseño subpondera las mega-caps IA que son la convicción más fuerte declarada — rinde peor que cap-weighted en este ciclo por esa razón estructural, no solo falta de catalizador" }
        IQLT: { veredicto: vender, motivo: "más débil del grupo (13.8% 3y, 7.8% 5y), internacional no ha acompañado en ciclo liderado por EEUU, y VXUS ya es el core internacional declarado" }
        ITUB: { veredicto: "zona gris — mantener sin urgencia", motivo: "barata (P/E 8.3x) y rentable (margen 33%, ROE 22%) pero crecimiento de ingresos levemente negativo y upside de analistas modesto (+7.8%). Posición chica, sin catalizador claro en ninguna dirección" }
        PICK: { veredicto: "zona gris — vigilar, no vender aún", motivo: "promedio histórico sólido (13.7% 3y) pero deterioro reciente real (-14.8% desde máximo) — revisar si se estabiliza o si el evento puntual se agrava" }

  regla_de_oro_timing_tecnico: >
    RSI, momentum y distancia del máximo de 52 semanas SOLO sirven para
    decidir CUÁNDO ejecutar una venta ya justificada por 1, 2 o 3 — nunca
    para decidir SI vender. El timing técnico es una herramienta de
    ejecución, no de decisión.

  prohibido:
    - "Vender algo solo porque no está en mi watchlist/verticales declaradas."
    - "Vender algo solo porque duplica otra posición, sin comparar cuál es mejor."
    - "Usar 'tiene ganancia acumulada' como razón por sí sola."
    - "Recomendar vender A y quedarse con B si B pierde la comparación directa en fundamentales."


# ── CORE (interés compuesto puro, sin tesis individual necesaria) ───────────
core:
  tesis: "Hold para siempre. No se vende por precio, solo por rebalanceo o necesidad real de liquidez."
  tickers: [VTI, VOO, VT, VXUS, VWO, VTV, GLDM]

# ── RENTA FIJA (diversificador/protección de crisis, NO compounding) ────────
# Confirmado por Matías: el propósito es distinto al de los índices de
# equity. NO simplificar aunque sean 4 tickers — cada uno cubre un rol
# de duración/inflación distinto (no es redundancia como el caso de PE).
diversificadores_renta_fija:
  tesis: "Ballast de portafolio — protección en crisis, no motor de retorno. Rol distinto a VOO/VTI."
  tickers:
    BND:   { rol: "bono amplio" }
    IEF:   { rol: "duración media (7-10y)" }
    VGSH:  { rol: "baja duración / bajo riesgo de tasa" }
    SCHP:  { rol: "protección inflación (TIPS)" }

# =============================================================================
# DISCIPLINA POR NIVEL DE RIESGO — eje independiente de la vertical.
# Determina revisión y stop-loss según QUÉ TAN RIESGOSA es la posición
# específica, no según en qué tesis vive. Un nombre riesgoso en drones
# recibe la misma disciplina que uno riesgoso en IA.
# =============================================================================
disciplina_por_riesgo:
  alto:
    revision_calendario_dias: 90
    stop_loss:
      tipo: "sigma_volatilidad_propia"
      sigma_umbral: 2.5
      ventana_maximo_dias: 90
      aplica_siempre: true
      descripcion: >
        Se activa SIEMPRE que la posición sea nivel_riesgo=alto,
        INDEPENDIENTE de si hoy está en ganancia o pérdida sobre costo.
        Corrección explícita de Matías (12 jul 2026): no quería un
        stop-loss que solo proteja posiciones ganadoras (+50%) ni que
        solo mire pérdidas desde costo — quería protección basada en LA
        VOLATILIDAD PROPIA de cada posición, para no perder una ganancia
        de +200% en una burbuja igual que para no profundizar una
        posición que va mal desde el día uno.
  medio:
    revision_calendario_dias: 180
    stop_loss: null   # sin stop-loss duro; solo revisión semestral de tesis
  bajo:
    revision_calendario_dias: null   # sin calendario forzado — revisar solo si la tesis se rompe
    stop_loss: null

# ── POLÍTICA DE PROFIT TAKING (posiciones que duplican) ──────────────────────
profit_taking:
  modo: "evaluar_con_contexto"
  umbral_ganancia_pct: 100
  nota: >
    Esto es COMPLEMENTARIO a disciplina_por_riesgo, no lo reemplaza. Al
    duplicar, se genera alerta EVALUAR con contexto de mercado — decisión
    caso a caso (agregar, mantener, recortar), no venta mecánica.

# ── EVENTOS PROGRAMADOS ───────────────────────────────────────────────────────
eventos:
  - { ticker: VCX, fecha: "2026-09-01", tipo: "lockup_expiry", dias_aviso: 21,
      nota: "Lockup expira septiembre 2026. Premium 390% sobre NAV — VENDER antes o al vencimiento." }

# ── TRIGGERS DE REVISIÓN FUTURA (condiciones que, si cambian, deben abrir una nueva conversación) ──
triggers_revision_futura:
  - condicion: "Matías define el sector de su emprendimiento"
    accion: >
      Si el sector es tech/IA: revisar el % en vertical ia_pila_completa.
      Hoy el capital humano (carrera) no está correlacionado con el
      portafolio financiero; si el emprendimiento termina siendo IA/tech,
      esa correlación aparece y podría justificar reducir concentración
      financiera en la misma tesis (diversificación de patrimonio total,
      no solo del portafolio líquido).
  - condicion: "El fondo de emergencia fuera del portafolio se completa"
    accion: >
      Hoy el portafolio cumple PARCIALMENTE rol de respaldo de liquidez.
      Si el fondo de emergencia aparte se completa, ese doble propósito
      desaparece y se podría relajar el mínimo de liquidez para
      emprendimiento (ya no serviría también de red de seguridad).
  - condicion: "Matías vive una caída de mercado real (>20% sostenido)"
    accion: >
      Su comportamiento en correcciones <20% (compró más) es evidencia
      fuerte pero no probada en un bear market real. Revisar si la
      disciplina de stop-loss/revisión trimestral necesita ajustarse
      según cómo reaccione de verdad.
