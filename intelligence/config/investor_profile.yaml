# =============================================================================
# INVESTOR PROFILE — Perfil, tesis y disciplina de riesgo de Matías
# Fuente de verdad para TODAS las decisiones del sistema de alertas.
# Reconstruido desde cero el 12 jul 2026 en entrevista profunda (no inferido).
# Todo lo marcado [Suposición] en comentarios debe confirmarse con Matías,
# nunca asumirse. Ver [Seguro]/[Probable] para lo ya confirmado en sesión.
# =============================================================================

perfil:
  nombre: "Matías"
  moneda_base: "CLP"
  moneda_inversion: "USD"
  residencia_fiscal: "Chile"
  estilo: "DCA semanal + compras oportunísticas en dips + apuestas temáticas de alta convicción"

# ── QUIÉN ES (know-your-client, confirmado en entrevista, no inferido) ───────
quien_soy:
  horizonte_inversion_anios: 20
  filosofia: >
    Interés compuesto de largo plazo. No timea el mercado — la convicción en
    la tesis determina la posición, no el precio de entrada. Alta tolerancia
    al riesgo pero no asume riesgo mal compensado.
  tolerancia_riesgo: "alta — CONFIRMADA por comportamiento, no solo declarada"
  evidencia_comportamiento: >
    En correcciones de mercado vividas (abril 2026 y otra similar, ambas
    <20% de caída), compró más en vez de vender o dudar. No ha vivido un
    mercado bajista real (>20% sostenido) — la disciplina de stop-loss/
    revisión trimestral de este archivo existe para ESA situación no
    probada aún, no por desconfianza en el track record que sí existe.
  ingreso: "estable, sueldo fijo — sostiene el DCA sin riesgo de pausa forzada en crisis"
  fondo_emergencia: "parcial — el portafolio cumple PARCIALMENTE rol de respaldo de liquidez, no es 100% capital intocable de 20 años"
  tesis_central: >
    Cobertura de la cadena de valor completa de infraestructura de IA
    (litografía → foundry → GPU → memoria → custom silicon → neocloud →
    hyperscalers → energía datacenter → aplicaciones). NO es una apuesta
    a qué modelo/compañía de IA "gana" — es una apuesta a quién construye
    la infraestructura que todos los jugadores de IA necesitan.
  riesgo_burbuja_ia: >
    Reconocido explícitamente por Matías. Por eso los nombres tempranos/
    pre-consolidados de la pila IA llevan nivel_riesgo=alto con stop-loss
    + revisión trimestral, aunque la tesis de fondo se mantenga.
  megatendencias_declaradas:
    - "IA / infraestructura (tesis central)"
    - "Fintech LatAm"
    - "Salud / GLP-1 / longevidad"
    - "Defensa / drones"
    - "Movilidad (ride-hailing, EV, robotaxi)"
    - "Energía / electrificación"
    - "Materiales críticos (litio, tierras raras, cobre)"

# ── OBJETIVO EMPRENDIMIENTO (restricción de liquidez más importante) ─────────
objetivo_emprendimiento:
  horizonte_anios: [1, 2]
  pct_portafolio_tocable: [20, 30]
  sector: "aún sin definir"
  # Trigger de revisión: ver triggers_revision_futura abajo
  activos_elegibles_liquidez:
    - VTI
    - VOO
    - VT
    - VXUS
    - VTV
    - GLDM
    - MSFT
    - GOOGL
    - AMZN

# ── LÍMITES DE RIESGO ────────────────────────────────────────────────────────
limites:
  max_pct_posicion_individual: 12.0   # excluye ETFs core (diversificados por construcción)
  max_pct_bucket: 25.0                # máx % de una vertical temática
  max_pct_factor: 40.0                # máx % en un cluster de correlación (posiciones que se mueven juntas)

# ── SIZING POR RIESGO ────────────────────────────────────────────────────────
sizing:
  riesgo_por_compra_pct: 0.25
  monto_min_usd: 100
  monto_max_usd: 1000
  factor_risk_off: 0.5
  cash_oportunistico_usd_mes: [500, 1000]
  dca_usd_mes: 1802

